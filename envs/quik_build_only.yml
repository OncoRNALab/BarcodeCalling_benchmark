name: quik_build_only
channels:
  - conda-forge
  - defaults

dependencies:
  # Build tools only (use system CUDA modules)
  - cmake>=3.22
  - make
  - gcc_linux-64>=11.0
  - gxx_linux-64>=11.0
  
  # Python for scripts
  - python=3.11
  - numpy
  - pandas
  - biopython

# NOTE: CUDA should be loaded from system modules on HPC:
# module load CUDA/12.6.0
# module load CMake/3.29.3-GCCcore-13.3.0

