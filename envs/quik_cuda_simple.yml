name: quik_cuda_simple
channels:
  - conda-forge
  - defaults

dependencies:
  # Build tools (CUDA will be from system/modules)
  - cmake>=3.22
  - make
  - gcc_linux-64>=11.0
  - gxx_linux-64>=11.0
  
  # OpenMP support
  - llvm-openmp
  
  # Additional utilities
  - git
  - wget

  # Python (optional, for potential post-processing)
  - python=3.11
  - biopython
  - numpy
  - pandas

# Note: This version does NOT include CUDA toolkit from conda
# Use system CUDA or HPC modules instead:
#   module load CUDA/12.6.0
# Then activate this environment
